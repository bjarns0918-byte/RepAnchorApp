<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings — Reputation Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14213D; --paper: #F5F6F2; --card: #ffffff; --line: #E2E4DE;
    --gold: #E8A33D; --muted: #6B7280; --coral: #D64545; --coral-light: #FBE7E5;
    --teal: #2D9C8A; --teal-light: #E1F5F0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink); font-family: "IBM Plex Sans", -apple-system, sans-serif; line-height: 1.5; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }
  .brand { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .brand-mark { display: flex; align-items: center; gap: 12px; }
  .brand h1 { font-family: "Fraunces", Georgia, serif; font-size: 22px; font-weight: 600; margin: 0; }
  .brand a.back { font-size: 13px; color: var(--muted); text-decoration: none; }
  .brand a.back:hover { color: var(--ink); }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 24px 26px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(20,33,61,0.05); }
  h2 { font-family: "Fraunces", Georgia, serif; font-size: 17px; font-weight: 600; margin: 0 0 14px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 4px; }
  input, select { width: 100%; font-family: inherit; font-size: 14px; border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; margin-bottom: 14px; }
  input:focus, select:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  input:disabled { background: #f2f2ef; color: var(--muted); }
  button { font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: none; border-radius: 7px; padding: 11px 18px; background: var(--ink); color: #fff; }
  button:hover { background: #0d1730; }
  button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  button.danger { background: transparent; color: var(--coral); border: 1px solid var(--coral-light); }
  button:disabled { background: #a3a8b5; cursor: default; }
  .error { font-size: 13px; color: var(--coral); background: var(--coral-light); border-radius: 7px; padding: 10px 12px; margin-bottom: 14px; display: none; }
  .success { font-size: 13px; color: var(--teal); background: var(--teal-light); border-radius: 7px; padding: 10px 12px; margin-bottom: 14px; display: none; }
  .hint { font-size: 12px; color: var(--muted); margin: -8px 0 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-mark">
      <svg width="28" height="28" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="16" fill="#14213D"/>
        <path d="M9 18h3.2l1.6-4 2.4 8 1.8-6.5 1.4 2.5H25" stroke="#E8A33D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <h1>Settings</h1>
    </div>
    <a href="/" class="back">&larr; Back to dashboard</a>
  </div>

  <div class="panel">
    <h2>Business details</h2>
    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox">Saved.</div>

    <form id="settingsForm">
      <label for="email">Email</label>
      <input type="email" id="email" disabled>
      <p class="hint">Email can't be changed here yet - contact support if you need to update it.</p>

      <label for="businessName">Business name</label>
      <input type="text" id="businessName" required>
      <p class="hint">Used in every AI-drafted reply, so make sure it's exactly right.</p>

      <label for="replyTone">Reply tone</label>
      <select id="replyTone">
        <option value="warm and casual">Warm and casual</option>
        <option value="professional and polished">Professional and polished</option>
        <option value="upbeat and playful">Upbeat and playful</option>
      </select>

      <label for="phone">Phone number <span style="font-weight:400;">(optional, for text reminders)</span></label>
      <input type="tel" id="phone" placeholder="(555) 555-5555">

      <button type="submit" id="saveBtn">Save changes</button>
    </form>
  </div>

  <div class="panel" id="billingPanel">
    <h2>Billing</h2>
    <p style="font-size:13px; color:var(--muted); margin-top:-6px;">Update your payment method or cancel your subscription anytime.</p>
    <button id="manageBillingBtn" class="secondary">Manage subscription</button>
    <div class="error" id="billingError" style="margin-top:12px;"></div>
  </div>
</div>

<script>
async function loadSettings() {
  const res = await fetch('/api/settings').then(r => r.json());
  if (!res.ok) {
    window.location.href = '/login.html';
    return;
  }
  document.getElementById('email').value = res.email;
  document.getElementById('businessName').value = res.businessName;
  document.getElementById('replyTone').value = res.replyTone;
  document.getElementById('phone').value = res.phone || '';
}

async function checkAdmin() {
  const me = await fetch('/api/me').then(r => r.json());
  if (me.ok && me.isAdmin) {
    document.getElementById('billingPanel').style.display = 'none';
  }
}

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  const errorBox = document.getElementById('errorBox');
  const successBox = document.getElementById('successBox');
  errorBox.style.display = 'none';
  successBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const body = {
    businessName: document.getElementById('businessName').value.trim(),
    replyTone: document.getElementById('replyTone').value,
    phone: document.getElementById('phone').value.trim()
  };

  const res = await fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(r => r.json());

  if (res.ok) {
    successBox.style.display = 'block';
  } else {
    errorBox.textContent = res.error;
    errorBox.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Save changes';
});

document.getElementById('manageBillingBtn').addEventListener('click', async () => {
  const btn = document.getElementById('manageBillingBtn');
  const errorBox = document.getElementById('billingError');
  errorBox.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Redirecting...';

  const res = await fetch('/api/create-portal-session', { method: 'POST' }).then(r => r.json());
  if (res.ok) {
    window.location.href = res.portalUrl;
  } else {
    errorBox.textContent = res.error;
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Manage subscription';
  }
});

loadSettings();
checkAdmin();
</script>
</body>
</html>
